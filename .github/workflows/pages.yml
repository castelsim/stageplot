# Deploy StagePlot su GitHub Pages pubblicando SOLO gli asset statici pubblici,
# escludendo il backend (supabase/), i sorgenti di build (src/, build.mjs,
# index.template.html) e la documentazione interna (docs/, AGENTS.md, ...).
#
# COME ATTIVARLO — finché non lo fai, il deploy attuale "da branch" resta INVARIATO:
#   1. Settings -> Pages -> Build and deployment -> Source = "GitHub Actions".
#   2. Lancia questo workflow a mano (tab Actions -> "Deploy Pages (solo statici)" -> Run workflow)
#      e verifica che stageplot.it funzioni ancora: tool, /privacy/, /consulenza/, /guida/, /termini/,
#      favicon, sitemap.xml, robots.txt.
#   3. Verifica che il backend NON sia piu servito, es. https://stageplot.it/supabase/functions/stripe-webhook/index.ts
#      deve dare 404.
#   4. FATTO (2026-07-07): push trigger attivo — ogni push su main pubblica via questo workflow.
name: Deploy Pages (solo statici)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2
        with:
          deno-version: v2.7.5
      - name: Verifica che index.html sia allineato ai sorgenti
        run: node build.mjs --check
      - name: Test motori frontend
        run: node --test test/engines.test.mjs
      - name: Test funzioni condivise Supabase
        run: deno test --lock=deno.lock --frozen supabase/functions/_shared/*.test.ts
      - name: Type-check Edge Functions
        run: >-
          deno check --lock=deno.lock --frozen
          supabase/functions/create-consultation/index.ts
          supabase/functions/get-shared-project/index.ts
          supabase/functions/process-consultation-notifications/index.ts
          supabase/functions/save-shared-project/index.ts
          supabase/functions/stripe-webhook/index.ts
          supabase/functions/submit-feedback/index.ts
      - name: Lint backend
        run: deno lint supabase/functions
      - name: Prepara la cartella pubblica (allowlist)
        run: |
          mkdir -p _site
          rsync -a --exclude='.DS_Store' --exclude='README.md' \
            .nojekyll 404.html CNAME LICENSE \
            index.html app.js icons.js sw.js manifest.webmanifest \
            robots.txt sitemap.xml llms.txt \
            favicon.ico favicon.svg favicon-48.png favicon-96.png \
            apple-touch-icon.png icon-192.png icon-512.png logo-512.png preview.png \
            consulenza guida privacy stage-plot termini vendor \
            ./_site/
      - name: Timbra il build ID (SHA del commit) negli asset pubblicati (audit L-03)
        run: sed -i "s/__BUILD_SHA_PLACEHOLDER__/${GITHUB_SHA:0:7}/g" _site/index.html
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: _site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
